name: Release

# Builds SR Verge installers for Windows, macOS and Linux and publishes them
# to a GitHub Release whenever a version tag (e.g. v2.5.2) is pushed.
# Can also be triggered manually from the Actions tab.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v2.5.2)"
        required: true
        default: "v2.5.2"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 -> NSIS installer (.exe)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # macOS Apple Silicon -> .dmg
          - os: macos-latest
            target: aarch64-apple-darwin
          # macOS Intel -> .dmg
          - os: macos-13
            target: x86_64-apple-darwin
          # Linux x64 -> .deb / .rpm / AppImage
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.os }}-${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Install frontend dependencies
        run: pnpm install

      - name: Download sidecars and resources (mihomo core, geo data, service)
        run: pnpm run prebuild ${{ matrix.target }}

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseName: "SR Verge ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          releaseBody: "SR Verge release. Installers are unsigned — on Windows choose 'More info → Run anyway' if SmartScreen warns."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
